quarkus.http.port=9093
quarkus.grpc.server.use-separate-server=false

quarkus.grpc.clients.cliente.host=localhost
quarkus.grpc.clients.cliente.port=9091
quarkus.grpc.clients.cliente.plain-text=true

quarkus.grpc.clients.restaurante.host=localhost
quarkus.grpc.clients.restaurante.port=9092
quarkus.grpc.clients.restaurante.plain-text=true

# ===================================================================
# DATA SOURCE (PostgreSQL)
# ===================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:admin}
quarkus.datasource.password=${POSTGRES_PASSWORD:secret}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5436/${POSTGRES_DB:pedido}

# ===================================================================
# HIBERNATE / JPA
# ===================================================================
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.database-generation=validate

# ===================================================================
# FLYWAY
# ===================================================================
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.default-schema=public
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.validate-on-migrate=true

# ===================================================================
# HIBERNATE ENVERS
# ===================================================================
quarkus.hibernate-envers.audit-table-suffix=_aud
quarkus.hibernate-envers.store-data-at-delete=true
quarkus.hibernate-envers.store-data-at-update=true
quarkus.hibernate-envers.global-with-modified-flag=false
quarkus.hibernate-envers.revision-field-name=rev
quarkus.hibernate-envers.revision-type-field-name=revtype

# ===================================================================
# KEYCLOAK
# ===================================================================
quarkus.oidc.auth-server-url=http://localhost:8180/realms/restaurante-realm
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=s4lkS22kfayLL/diMrkfQArD99+ZBjUndgjFIirUUFw=
quarkus.oidc.application-type=service
quarkus.oidc.discovery-enabled=true
quarkus.oidc.token.issuer=http://localhost:8180/realms/restaurante-realm

# Keycloak Admin Client
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.target-realm=restaurante-realm
quarkus.keycloak.admin-client.grant-type=password

# ===================================================================
# RABBITMQ - CONEXĂO UNIFICADA
# ===================================================================
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

# ===================================================================
# CANAIS DE SAÍDA (OUTGOING) - Pedido envia para o RabbitMQ
# ===================================================================

# Canal para notificar a criaçăo do pedido
mp.messaging.outgoing.pedido-criado.connector=smallrye-rabbitmq
mp.messaging.outgoing.pedido-criado.exchange.name=pedido.criado
mp.messaging.outgoing.pedido-criado.default-routing-key=pedido.criado

# Canal usado pelo Fallback de Resilięncia (Circuit Breaker)
mp.messaging.outgoing.pagamento-pendente.connector=smallrye-rabbitmq
mp.messaging.outgoing.pagamento-pendente.exchange.name=pagamento.pendente

# ===================================================================
# CANAIS DE ENTRADA (INCOMING) - Pedido recebe do RabbitMQ
# ===================================================================

# Canal para receber o resultado processado pelo serviço de Pagamento
mp.messaging.incoming.pagamento-resultado.connector=smallrye-rabbitmq
mp.messaging.incoming.pagamento-resultado.queue.name=pagamento.resultado
mp.messaging.incoming.pagamento-resultado.exchange.name=pagamento.resultado

# Dica: força a criaçăo automática da fila e do vínculo (binding) caso năo existam
mp.messaging.incoming.pagamento-resultado.auto-bind-dlq=true
mp.messaging.incoming.pagamento-resultado.dead-letter-exchange=DLX
mp.messaging.incoming.pagamento-resultado.dead-letter-queue=pagamento.resultado.dlq

# Declara o exchange DLX automaticamente
mp.messaging.incoming.pagamento-resultado.dlx.declare=true
mp.messaging.incoming.pagamento-resultado.dlx.type=direct
