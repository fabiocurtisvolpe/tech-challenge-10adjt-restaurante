syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.adjt.cliente";
option java_outer_classname = "ClienteProto";

package cliente;

// Definição do Endereço
message Endereco {
  int64 id = 1;
  string rua = 2;
  string bairro = 3;
  string cep = 4;
  string complemento = 5;
  string numero = 6;
  string cidade = 7;
  string uf = 8;
  bool principal = 9;
  string observacao = 10;
}

// Definição do Cliente
message Cliente {
  int64 id = 1;
  string nome = 2;
  string cpf = 3;
  string email = 4;
  repeated Endereco enderecos = 5; // Representa a lista de endereços (1:N)
}

// Mensagens de Requisição e Resposta
message ClienteIdRequest {
  int64 id = 1;
}

message ValidarUsuarioRequest {
  string uid = 1;
  int64 id = 2;
}

message ValidarUsuarioResponse {
  bool valido = 1;
}

// Serviço gRPC
service ClienteService {

  rpc BuscarPorId (ClienteIdRequest) returns (Cliente);
  rpc ValidarUsuarioLogado (ValidarUsuarioRequest) returns (ValidarUsuarioResponse);
}
